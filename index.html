function shuffle(a){return jsPsych.randomization.shuffle(a.slice())}
function noThreeSame(arr,key){for(let i=2;i<arr.length;i++)if(arr[i][key]===arr[i-1][key]&&arr[i][key]===arr[i-2][key])return false;return true}
function makeEptOrder(items){for(let attempt=0;attempt<3000;attempt++){let x=shuffle(items);let ok=true;for(let i=1;i<x.length;i++){if(x[i].scene===x[i-1].scene)ok=false;if(x[i].family&&x[i].family===x[i-1].family&&x[i].type==='target'&&x[i-1].type==='target')ok=false;}if(ok&&noThreeSame(x,'type'))return x;}return items;}
function blockIsGood(z,previous){
  for(let i=1;i<z.length;i++){
    if(z[i].variable&&z[i-1].variable&&z[i].variable===z[i-1].variable)return false;
    if(z[i].scene&&z[i-1].scene&&z[i].scene===z[i-1].scene)return false;
  }
  if(!noThreeSame(z,'condition'))return false;
  if(previous){
    if(previous.variable&&z[0].variable&&previous.variable===z[0].variable)return false;
    if(previous.scene&&z[0].scene&&previous.scene===z[0].scene)return false;
  }
  return true;
}
function makeAjtOrder(targets,fillers){
  const V1=shuffle(targets.filter(x=>x.variable==='V1'));
  const V2=shuffle(targets.filter(x=>x.variable==='V2'));
  const V3=shuffle(targets.filter(x=>x.variable==='V3'));
  const F=shuffle(fillers); let out=[];
  for(let b=0;b<8;b++){
    const source=[V1[b],V2[b],V3[b],F[b*3],F[b*3+1],F[b*3+2]];
    let block=source.slice(), previous=out.length?out[out.length-1]:null;
    for(let n=0;n<2000;n++){
      const candidate=shuffle(source);
      if(blockIsGood(candidate,previous)){block=candidate;break;}
    }
    out.push(...block);
  }
  // final global safeguard against 3 same conditions across block boundaries
  for(let pass=0;pass<200;pass++){
    let bad=-1;
    for(let i=2;i<out.length;i++)if(out[i].condition===out[i-1].condition&&out[i].condition===out[i-2].condition){bad=i;break;}
    if(bad<0)break;
    const j=Math.min(out.length-1,bad+2+Math.floor(Math.random()*4));
    [out[bad],out[j]]=[out[j],out[bad]];
  }
  return out;
}

function eptTimeline(){

 t.push({type:jsPsychHtmlButtonResponse,stimulus:`<h3>图片描述任务</h3><div class="info-box"><p>每道题有左右两幅图：左图表示事情开始时的情况，右图表示后来发生的情况。</p><p>图片中的<b>A代表“我”</b>。请假设您就是A，根据左右两幅图，用一句完整、自然的汉语说明B做了什么，或者B从左图到右图发生了什么变化。</p><p>请写完整句子，不要只写一个词；不要求使用某个指定句型。不会写汉字时，可以使用拼音，也可以汉字和拼音混写。</p><p class="small-note">没有唯一标准答案。图片可点击放大，再次点击恢复。</p></div>`,choices:['进行练习']});

}
function ajtTimeline(){
 let t=[];
 t.push({type:jsPsychHtmlButtonResponse,stimulus:`<h3>句子自然度判断任务</h3><div class="info-box"><p>每道题先给出一个情境，再给出一个句子。请把前面的情境当作已经发生的事实，您的任务只是判断后面的句子放在这个情境中是否自然。</p><p>1＝非常不自然；2＝比较不自然；3＝介于自然和不自然之间；4＝比较自然；5＝非常自然。</p><p>请根据第一感觉作答，不需要反复修改。</p></div>`,choices:['进行练习']});

 t.push({type:jsPsychHtmlButtonResponse,stimulus:'<div class="info-box">第一句通常可以评较高分；第二句通常可以评较低分。正式任务没有标准答案，请根据自己的语感判断。</div>',choices:['开始正式任务']});
 ajtItems.forEach((it,i)=>t.push({type:jsPsychSurveyLikert,questions:[{prompt:`<div class="trial-counter">判断题 ${i+1} / ${ajtItems.length}</div><div class="ajt-context">${it.context}</div><div class="ajt-sentence">${it.sentence}</div>`,labels:scale,required:true,name:`ajt_${it.id}`}],button_label:'下一题',data:{task_type:'AJT',item_id:it.id,variable:it.variable||'filler',condition:it.condition,version:it.version||null,scene:it.scene,stimulus_context:it.context,stimulus_sentence:it.sentence,presentation_order:i+1}}));
 return t;
}
const EPT=eptTimeline(),AJT=ajtTimeline(); const first=task_order==='EPT_AJT'?EPT:AJT, second=task_order==='EPT_AJT'?AJT:EPT;

timeline.push({type:jsPsychCallFunction,func:()=>jsPsych.data.addProperties({total_duration_seconds:Math.round(jsPsych.getTotalTime()/1000),page_blur_count})});

jsPsych.run(timeline);
